<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>1 mês com Neide ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0d0d0d;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    section {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transform: translateY(50px);
      transition: 1s;
    }

    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    img {
      max-width: 80%;
      border-radius: 15px;
      margin-top: 20px;
    }

    h1, h2 {
      margin: 10px;
    }

    .highlight {
      color: #ff4d6d;
    }
  </style>
</head>

<body>

<audio autoplay loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<section>
  <h1>Há 1 mês atrás…</h1>
</section>

<section>
  <h2>tudo começou de forma <span class="highlight">simples</span></h2>
  <img src="foto1.jpg">
</section>

<section>
  <h2>mas com algo <span class="highlight">especial</span></h2>
  <img src="foto2.jpg">
</section>

<section>
  <h2>e foi ficando cada vez mais <span class="highlight">real</span></h2>
  <img src="foto3.jpg">
</section>

<section>
  <h2>hoje eu tenho certeza…</h2>
</section>

<section>
  <h2>que você vale muito a pena, <span class="highlight">Neide ❤️</span></h2>
</section>

<section>
  <h1>1 mês ao seu lado…</h1>
  <h2>e isso é só o começo 💫</h2>
  <h3>Denis & Neide ❤️</h3>
</section>

<script>
  const sections = document.querySelectorAll("section");

  window.addEventListener("scroll", () => {
    sections.forEach(section => {
      const top = section.getBoundingClientRect().top;
      if (top < window.innerHeight - 100) {
        section.classList.add("show");
      }
    });
  });
</script>

</body>
    </html>
